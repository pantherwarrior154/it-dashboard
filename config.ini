# IT Dashboard Configuration
# This file is read by the config parser module in Week 2.
# Format: key = value (one setting per line)
# Lines starting with # are comments.

[general]
app_name = IT Dashboard
version = 0.1.0
author = Student Name
organization = Acme Corp IT Department

[network]
subnet = 10.0.0.0/16
gateway = 10.0.0.1
dns_primary = 10.0.10.20
dns_secondary = 8.8.8.8
domain = acme.local
ntp_server = time.nist.gov

[monitoring]
check_interval = 300
alert_email = ops-team@company.com
disk_warn_threshold = 80
disk_crit_threshold = 95
cpu_warn_threshold = 85
memory_warn_threshold = 90
log_file = data/server.log
log_level = INFO

[backup]
schedule = daily
time = 02:00
retention_days = 30
destination = /mnt/backup/it-dashboard
compress = true
type = incremental

[security]
max_login_attempts = 5
lockout_duration = 900
session_timeout = 3600
require_mfa = false
password_min_length = 12